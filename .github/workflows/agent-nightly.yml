name: Agent Nightly Build

# Runs every night and on demand. Picks up the oldest open issue labeled
# "agent-ready", does the work headlessly, opens a PR. Never auto-merges.
# Issues labeled "needs-human-merge" (money/consent/legal) get a PR but the
# workflow will not approve or merge it under any condition.

on:
  schedule:
    - cron: "0 9 * * *"   # 9:00 UTC ≈ 4-5am Detroit — work shows up by morning
  workflow_dispatch: {}     # manual trigger button in the Actions tab

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pick-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/fulfillment-layer-v1

      - name: Find oldest agent-ready issue
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "agent-ready",
              sort: "created",
              direction: "asc",
              per_page: 10
            });
            if (issues.data.length === 0) {
              core.setOutput("found", "false");
              return;
            }
            const safe = issues.data.find(i =>
              !i.labels.some(l => l.name === "needs-human-merge")
            );
            if (!safe) {
              core.info("Only needs-human-merge issues found — skipping nightly run.");
              core.setOutput("found", "false");
              return;
            }
            const issue = safe;
            core.setOutput("found", "true");
            core.setOutput("number", issue.number);
            core.setOutput("title", issue.title);
            core.setOutput("body", issue.body || "");
            core.setOutput("needs_human_merge", "false");

      - name: Run Claude Code on the issue
        if: steps.pick.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read CLAUDE.md first and follow it exactly — it is non-negotiable,
            especially the "Money and consent" section.

            Work issue #${{ steps.pick.outputs.number }}: "${{ steps.pick.outputs.title }}"

            ${{ steps.pick.outputs.body }}

            Implement this on a new branch named agent/issue-${{ steps.pick.outputs.number }}.
            Write or update tests where applicable. Commit with a clear message.
            Open a PR against release/fulfillment-layer-v1 that references
            "Closes #${{ steps.pick.outputs.number }}". Do not merge the PR
            yourself under any circumstance. In the PR description, summarize
            what changed, why, and explicitly call out if this PR touches
            money, consent, or legal state.
          claude_args: "--max-turns 40 --allowedTools Edit,Read,Write,Bash(git*),Bash(npm*)"

      - name: Label the issue as in-review
        if: steps.pick.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pick.outputs.number }},
              labels: ["agent-in-review"]
            });
