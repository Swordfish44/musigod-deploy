<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusiGod — Recovery Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
  :root{--red:#E8262A;--red-dark:#B81E22;--black:#0A0A0A;--surface:#111111;--surface-2:#1A1A1A;--surface-3:#252525;--border:rgba(255,255,255,0.08);--border-mid:rgba(255,255,255,0.14);--text:#FFFFFF;--text-dim:#999999;--text-muted:#555555;--green:#22C55E;--amber:#F59E0B;--blue:#3B82F6;--purple:#A855F7;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
  .logo{font-size:1.4rem;font-weight:800;letter-spacing:-0.01em;text-decoration:none;}.logo-musi{color:#fff;}.logo-god{color:var(--red);}
  nav a{font-size:0.72rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:0.45rem 0.9rem;border-radius:4px;}
  nav a:hover{color:var(--text);}
  .hero{border-bottom:1px solid var(--border);padding:3rem 2rem 2.5rem;}
  .hero-inner{max-width:980px;margin:0 auto;}
  .hero-eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--red);margin-bottom:0.6rem;}
  .hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:0.4rem;}
  .hero-sub{color:var(--text-dim);font-size:0.88rem;}
  main{max-width:980px;margin:0 auto;padding:2.5rem 2rem;}

  /* Readiness meter */
  .readiness-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.75rem;margin-bottom:2rem;}
  .readiness-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
  .readiness-title{font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);}
  .readiness-score{font-size:2.5rem;font-weight:800;letter-spacing:-0.03em;}
  .readiness-bar-wrap{height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden;margin-bottom:1.25rem;}
  .readiness-bar{height:100%;border-radius:4px;transition:width 0.6s ease;}
  .readiness-lists{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .readiness-list h4{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;}
  .readiness-list h4.missing{color:var(--amber);}
  .readiness-list h4.completed{color:var(--green);}
  .readiness-item{display:flex;align-items:flex-start;gap:0.5rem;font-size:0.78rem;color:var(--text-dim);padding:0.25rem 0;}
  .readiness-item .check{flex-shrink:0;margin-top:1px;}
  .readiness-reason{font-size:0.75rem;color:var(--text-muted);margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border);}

  /* Operational engagements */
  .section{margin-bottom:2.5rem;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
  .section-title{font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);}
  .engagement-status-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:0.75rem;}
  .est-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;}
  .est-title{font-size:0.95rem;font-weight:700;}
  .est-badges{display:flex;gap:0.35rem;flex-wrap:wrap;flex-shrink:0;}
  .badge{font-size:0.57rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.22rem 0.55rem;border-radius:3px;}
  .badge-active{background:rgba(34,197,94,0.15);color:var(--green);}
  .badge-authorized{background:rgba(59,130,246,0.1);color:var(--blue);}
  .badge-pending{background:rgba(245,158,11,0.15);color:var(--amber);}
  .stage-bar{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:6px;padding:0.9rem 1rem;margin-bottom:0.75rem;}
  .stage-label{font-size:0.82rem;font-weight:600;margin-bottom:0.2rem;}
  .stage-desc{font-size:0.75rem;color:var(--text-dim);}
  .stage-blocking{font-size:0.72rem;color:var(--amber);margin-top:0.3rem;display:flex;align-items:center;gap:0.3rem;}
  .team-tag{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.7rem;color:var(--text-muted);background:var(--surface-2);border:1px solid var(--border);border-radius:3px;padding:0.2rem 0.6rem;margin-bottom:0.5rem;}
  .team-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .last-updated{font-size:0.68rem;color:var(--text-muted);margin-top:0.5rem;}

  /* Signed agreements */
  .agreement-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.9rem 1.25rem;margin-bottom:0.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
  .agr-left .agr-title{font-size:0.82rem;font-weight:500;}
  .agr-left .agr-meta{font-size:0.68rem;color:var(--text-muted);margin-top:0.15rem;}
  .agr-right{text-align:right;}
  .agr-ref{font-size:0.65rem;color:var(--text-muted);font-family:monospace;}

  /* Activity feed */
  .activity-item{display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid var(--border);}
  .activity-item:last-child{border-bottom:none;}
  .activity-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px;}
  .activity-content{flex:1;}
  .activity-summary{font-size:0.8rem;font-weight:500;}
  .activity-meta{font-size:0.68rem;color:var(--text-muted);margin-top:0.1rem;}

  .btn{font-size:0.72rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;border:none;padding:0.6rem 1.25rem;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:0.35rem;transition:background 0.15s;}
  .btn-primary{background:var(--red);color:#fff;}.btn-primary:hover{background:var(--red-dark);}
  .btn-ghost{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--surface-3);color:var(--text);}

  .empty-state{padding:2.5rem;text-align:center;color:var(--text-muted);font-size:0.82rem;}
  .loading-state{padding:2.5rem;text-align:center;color:var(--text-muted);font-size:0.82rem;}
  .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 0.75rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  footer{margin-top:4rem;padding:1.5rem 2rem;border-top:1px solid var(--border);text-align:center;}
  footer p{font-size:0.72rem;color:var(--text-muted);}
  @media(max-width:600px){header{padding:0 1rem;}main{padding:1.5rem 1rem;}.hero{padding:2rem 1rem;}.readiness-lists{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <a href="/portal.html" class="logo"><span class="logo-musi">MUSI</span><span class="logo-god">GOD</span></a>
  <nav>
    <a href="/portal.html">Portal</a>
    <a href="/recovery-conversion.html" id="conversion-link">Recovery</a>
    <a href="/activity.html" id="activity-link">Activity</a>
    <a href="/upload-documents.html" id="upload-link">Upload Docs</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Recovery Operations</p>
    <h1>Operational Status</h1>
    <p class="hero-sub" id="hero-sub">Loading recovery status…</p>
  </div>
</div>

<main>
  <div id="main-content">
    <div class="loading-state"><div class="spinner"></div>Loading operational status…</div>
  </div>
</main>

<footer><p>MusiGod Publishing Administration · Recovered royalties. Verified rights. Artists keep ownership.</p></footer>

<script>
const params    = new URLSearchParams(window.location.search)
const EMAIL     = params.get('email')     || localStorage.getItem('musigod_artist_email') || localStorage.getItem('musigod_rights_audit_email') || ''
const ARTIST_ID = params.get('artist_id') || localStorage.getItem('musigod_artist_id') || ''
const AUDIT_ID  = params.get('audit_id')  || localStorage.getItem('musigod_rights_audit_id') || ''
if (EMAIL) localStorage.setItem('musigod_artist_email', EMAIL)

const ctx = new URLSearchParams()
if (EMAIL)     ctx.set('email', EMAIL)
if (ARTIST_ID) ctx.set('artist_id', ARTIST_ID)
if (AUDIT_ID)  ctx.set('audit_id', AUDIT_ID)
document.getElementById('conversion-link').href = '/recovery-conversion.html?' + ctx
document.getElementById('activity-link').href   = '/activity.html?' + ctx
document.getElementById('upload-link').href     = '/upload-documents.html?' + ctx

const TEAM_LABELS = {
  publishing_admin_ops:         'Publishing Administration Operations',
  mechanical_rights_ops:        'Mechanical Rights Operations',
  neighboring_rights_ops:       'Neighboring Rights Operations',
  international_collection_ops: 'International Collection Operations',
  rights_verification_ops:      'Rights Verification Operations',
  recovery_operations:          'Recovery Operations',
  escalation_desk:              'Recovery Escalation Desk',
}

async function loadStatus() {
  if (!EMAIL) {
    document.getElementById('main-content').innerHTML = '<div class="empty-state">No artist context. Return to your <a href="/portal.html" style="color:var(--red)">portal</a>.</div>'
    return
  }
  try {
    const res = await fetch(`/api/get-operational-status?email=${encodeURIComponent(EMAIL)}`)
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Load failed')
    render(data)
  } catch (err) {
    document.getElementById('main-content').innerHTML = `<div class="empty-state">Error: ${esc(err.message)}</div>`
  }
}

function render(data) {
  const { readiness, op_summary, signed_agreements, updates } = data

  document.getElementById('hero-sub').textContent = EMAIL + ' · Recovery operations in progress'

  let html = ''

  // Readiness meter
  if (readiness) {
    const score = readiness.readiness_score || 0
    const color = score >= 80 ? 'var(--green)' : score >= 50 ? 'var(--amber)' : 'var(--red)'
    const missing = readiness.missing_requirements || []
    const completed = readiness.completed_requirements || []

    html += `
      <div class="readiness-card">
        <div class="readiness-header">
          <div class="readiness-title">Recovery Readiness</div>
          <div class="readiness-score" style="color:${color}">${score}<span style="font-size:1rem;font-weight:400;color:var(--text-muted)">/100</span></div>
        </div>
        <div class="readiness-bar-wrap"><div class="readiness-bar" style="width:${score}%;background:${color}"></div></div>
        <div class="readiness-lists">
          <div class="readiness-list">
            <h4 class="missing">Still Needed</h4>
            ${missing.length ? missing.map(m => `<div class="readiness-item"><span class="check" style="color:var(--amber)">○</span><span>${esc(m)}</span></div>`).join('') : '<div style="font-size:0.78rem;color:var(--green)">All requirements met.</div>'}
          </div>
          <div class="readiness-list">
            <h4 class="completed">Completed</h4>
            ${completed.length ? completed.map(c => `<div class="readiness-item"><span class="check" style="color:var(--green)">✓</span><span>${esc(c)}</span></div>`).join('') : '<div style="font-size:0.78rem;color:var(--text-muted)">None completed yet.</div>'}
          </div>
        </div>
        ${readiness.readiness_reasoning ? `<div class="readiness-reason">${esc(readiness.readiness_reasoning)}</div>` : ''}
      </div>`
  }

  // Active engagements with stage + team
  if (op_summary?.length) {
    html += `<div class="section"><div class="section-header"><div class="section-title">Active Recovery Engagements</div><div style="font-size:0.72rem;color:var(--text-muted)">${op_summary.length} engagement${op_summary.length !== 1 ? 's' : ''}</div></div>`
    html += op_summary.map(e => {
      const teamLabel = TEAM_LABELS[e.assigned_team] || (e.assigned_team ? e.assigned_team.replace(/_/g,' ') : null)
      const lastUpdated = e.last_updated_at ? timeSince(e.last_updated_at) : null
      return `
        <div class="engagement-status-card">
          <div class="est-top">
            <div>
              <div class="est-title">${esc(e.service_title || e.service_type)}</div>
              ${teamLabel ? `<div class="team-tag"><span class="dot"></span>${esc(teamLabel)}</div>` : ''}
            </div>
            <div class="est-badges">
              <span class="badge badge-${(e.engagement_status||'authorized').toLowerCase()}">${esc(e.engagement_status || 'AUTHORIZED')}</span>
            </div>
          </div>

          ${e.stage_label ? `
            <div class="stage-bar">
              <div class="stage-label">${esc(e.stage_label)}</div>
              ${e.stage_description ? `<div class="stage-desc">${esc(e.stage_description)}</div>` : ''}
              ${e.blocking_dependency ? `<div class="stage-blocking">⚠ ${esc(e.blocking_dependency)}</div>` : ''}
            </div>` : ''}

          ${e.readiness_score != null ? `
            <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:0.5rem;">
              Readiness: <span style="color:${e.readiness_score >= 80 ? 'var(--green)' : 'var(--amber)'};font-weight:600">${e.readiness_score}/100</span>
              ${e.readiness_level ? ' · ' + esc(e.readiness_level) : ''}
            </div>` : ''}

          ${e.last_update_summary ? `<div class="last-updated">Last update: ${esc(e.last_update_summary)}${lastUpdated ? ' · ' + lastUpdated : ''}</div>` : ''}
        </div>`
    }).join('')
    html += '</div>'
  } else {
    html += `
      <div class="section">
        <div class="section-header"><div class="section-title">Active Recovery Engagements</div></div>
        <div class="empty-state">No active engagements yet. <a href="/recovery-conversion.html?${ctx}" style="color:var(--red)">Authorize a recovery service →</a></div>
      </div>`
  }

  // Signed agreements
  if (signed_agreements?.length) {
    html += `<div class="section"><div class="section-header"><div class="section-title">Signed Agreements</div></div>`
    html += signed_agreements.map(a => `
      <div class="agreement-row">
        <div class="agr-left">
          <div class="agr-title">${esc(a.service_type.replace(/_/g,' '))}</div>
          <div class="agr-meta">Version ${esc(a.version)} · Signed ${new Date(a.signed_at).toLocaleDateString()}</div>
        </div>
        <div class="agr-right">
          <span class="badge badge-active">SIGNED</span>
          <div class="agr-ref">${esc(a.agreement_ref)}</div>
        </div>
      </div>`).join('')
    html += '</div>'
  }

  // Operational activity feed
  if (updates?.length) {
    html += `<div class="section"><div class="section-header"><div class="section-title">Operational Updates</div></div>`
    html += updates.map(u => `
      <div class="activity-item">
        <div class="activity-dot"></div>
        <div class="activity-content">
          <div class="activity-summary">${esc(u.update_summary)}</div>
          <div class="activity-meta">${u.updated_by !== 'system' ? esc(u.updated_by) + ' · ' : ''}${new Date(u.created_at).toLocaleString()}</div>
        </div>
      </div>`).join('')
    html += '</div>'
  }

  // CTA if no signed agreements
  if (!signed_agreements?.length) {
    html += `
      <div style="background:var(--surface-2);border:1px solid rgba(232,38,42,0.2);border-left:3px solid var(--red);border-radius:8px;padding:1.5rem 1.75rem;margin-top:1rem;">
        <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:0.4rem;">Start your recovery today</h3>
        <p style="font-size:0.82rem;color:var(--text-dim);margin-bottom:1rem;">Authorize recovery services and upload documents to initiate operational work.</p>
        <a href="/recovery-conversion.html?${ctx}" class="btn btn-primary">View Recovery Opportunities →</a>
      </div>`
  }

  document.getElementById('main-content').innerHTML = html
}

function timeSince(ts) {
  const diff = Date.now() - new Date(ts).getTime()
  const mins  = Math.floor(diff / 60000)
  const hours = Math.floor(diff / 3600000)
  const days  = Math.floor(diff / 86400000)
  if (mins < 2)   return 'just now'
  if (hours < 1)  return mins + 'm ago'
  if (days < 1)   return hours + 'h ago'
  return days + 'd ago'
}

function esc(v) { return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

loadStatus()
</script>
</body>
</html>
