<title>MusiGod — Admin Queues</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8262A; --red-dark: #B81E22;
    --black: #0A0A0A; --surface: #111111; --surface-2: #1A1A1A; --surface-3: #252525;
    --border: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.14);
    --text: #FFFFFF; --text-dim: #999999; --text-muted: #555555;
    --green: #22C55E; --amber: #F59E0B; --blue: #3B82F6;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.01em; text-decoration: none; }
  .logo-musi { color: #fff; } .logo-god { color: var(--red); }
  nav { display: flex; align-items: center; gap: 0.25rem; }
  nav a { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; padding: 0.45rem 0.9rem; border-radius: 4px; transition: all 0.15s; }
  nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  nav a.active { color: var(--text); }
  .hero { border-bottom: 1px solid var(--border); padding: 2.5rem 2rem; }
  .hero-inner { max-width: 1300px; margin: 0 auto; }
  .hero-eyebrow { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--red); margin-bottom: 0.5rem; }
  .hero h1 { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; }
  main { max-width: 1300px; margin: 0 auto; padding: 2rem; }
  .auth-gate { max-width: 480px; margin: 4rem auto; text-align: center; }
  .auth-gate h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; }
  .auth-gate p { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 1.5rem; }
  .auth-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.88rem; padding: 0.7rem 1rem; border-radius: 6px; outline: none; margin-bottom: 0.75rem; }
  .auth-input:focus { border-color: var(--border-mid); }
  .btn { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border: none; padding: 0.65rem 1.5rem; border-radius: 4px; cursor: pointer; transition: background 0.15s, transform 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
  .btn-green  { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
  .btn-amber  { background: rgba(245,158,11,0.15);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
  .btn-blue   { background: rgba(59,130,246,0.15);  color: var(--blue);   border: 1px solid rgba(59,130,246,0.3); }
  .btn-gray   { background: var(--surface-3); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost  { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface-3); color: var(--text); }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
  .select-filter { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.75rem; padding: 0.45rem 0.8rem; border-radius: 4px; outline: none; }
  .select-filter option { background: var(--surface-2); }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
  .summary-cell { background: var(--surface-2); padding: 0.9rem 1rem; }
  .summary-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.2rem; }
  .summary-val { font-size: 1.4rem; font-weight: 700; }
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); text-align: left; }
  .task-table td { font-size: 0.78rem; padding: 0.8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  .task-table tr:last-child td { border-bottom: none; }
  .task-table tr:hover td { background: var(--surface-2); }
  .task-title { font-weight: 500; }
  .task-body { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.2rem; }
  .badge { font-size: 0.57rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.22rem 0.55rem; border-radius: 3px; }
  .badge-open     { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-progress { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-blocked  { background: rgba(232,38,42,0.15);  color: var(--red); }
  .badge-complete { background: rgba(34,197,94,0.15);  color: var(--green); }
  .badge-cancelled{ background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .badge-urgent   { background: rgba(232,38,42,0.2);   color: var(--red); }
  .badge-high     { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-normal   { background: rgba(59,130,246,0.1);  color: var(--blue); }
  .badge-low      { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .assign-input { background: var(--surface-3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.7rem; padding: 0.25rem 0.5rem; border-radius: 3px; width: 100px; outline: none; }
  .loading-state, .empty-state { padding: 3rem; text-align: center; color: var(--text-muted); font-size: 0.82rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; overflow-x: auto; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
  .msg { padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.78rem; margin-bottom: 1rem; display: none; }
  .msg.show { display: block; }
  .msg-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .msg-error   { background: rgba(232,38,42,0.1); border: 1px solid rgba(232,38,42,0.3); color: #ff6b6b; }
  footer { margin-top: 4rem; padding: 1.5rem 2rem; border-top: 1px solid var(--border); text-align: center; }
  footer p { font-size: 0.72rem; color: var(--text-muted); }
  @media (max-width: 768px) { header { padding: 0 1rem; } main { padding: 1rem; } .hero { padding: 1.5rem 1rem; } }
</style>
</head>

<header>
  <a href="/admin.html" class="logo"><span class="logo-musi">MUSI</span><span class="logo-god">GOD</span></a>
  <nav>
    <a href="/admin.html">Admin</a>
    <a href="/admin-queues.html" class="active">Queues</a>
    <a href="/recovered-money.html">Recovery</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">Operations</p>
    <h1>Admin Queues</h1>
  </div>
</div>

<main>
  <div id="auth-gate" class="auth-gate">
    <h2>Admin Access Required</h2>
    <p>Enter your admin key to access the queue management system.</p>
    <input type="password" class="auth-input" id="admin-key-input" placeholder="Admin key" onkeydown="if(event.key==='Enter')authenticate()">
    <br>
    <button class="btn btn-primary" onclick="authenticate()">ACCESS QUEUES</button>
    <div class="msg msg-error" id="auth-error" style="margin-top:0.75rem;text-align:left"></div>
  </div>

  <div id="admin-content" style="display:none">
    <div class="msg msg-success" id="msg-success"></div>
    <div class="msg msg-error" id="msg-error"></div>

    <div class="summary-grid" id="summary-grid">
      <div class="loading-state" style="grid-column:1/-1;padding:1rem">Loading…</div>
    </div>

    <div class="controls">
      <select class="select-filter" id="filter-queue" onchange="loadQueues()">
        <option value="">All Queues</option>
        <option>NEW_ARTIST_QUEUE</option>
        <option>DOCS_MISSING_QUEUE</option>
        <option>PRO_REGISTRATION_QUEUE</option>
        <option>MLC_QUEUE</option>
        <option>SOUND_EXCHANGE_QUEUE</option>
        <option>RECOVERY_PENDING_QUEUE</option>
        <option>FOLLOWUP_QUEUE</option>
        <option>PAYMENT_QUEUE</option>
        <option>ESCALATION_QUEUE</option>
      </select>
      <select class="select-filter" id="filter-status" onchange="loadQueues()">
        <option value="">All Statuses</option>
        <option>OPEN</option><option>IN_PROGRESS</option><option>BLOCKED</option><option>COMPLETE</option><option>CANCELLED</option>
      </select>
      <select class="select-filter" id="filter-priority" onchange="loadQueues()">
        <option value="">All Priorities</option>
        <option>URGENT</option><option>HIGH</option><option>NORMAL</option><option>LOW</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="loadQueues()">↻ Refresh</button>
    </div>

    <div class="section-header">
      <div class="section-title" id="task-count">Tasks</div>
    </div>
    <div class="table-wrap" id="queue-table">
      <div class="loading-state"><div class="spinner"></div>Loading tasks…</div>
    </div>
  </div>
</main>

<footer><p>MusiGod Internal Operations · Admin only.</p></footer>

<script>
let ADMIN_KEY = sessionStorage.getItem('musigod_admin_key') || ''
if (ADMIN_KEY) showContent()

function authenticate() {
  const key = document.getElementById('admin-key-input').value.trim()
  if (!key) return
  ADMIN_KEY = key
  sessionStorage.setItem('musigod_admin_key', key)
  showContent()
}

function showContent() {
  document.getElementById('auth-gate').style.display = 'none'
  document.getElementById('admin-content').style.display = 'block'
  loadQueues()
}

async function loadQueues() {
  document.getElementById('queue-table').innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>'
  const params = new URLSearchParams()
  const q = document.getElementById('filter-queue').value
  const s = document.getElementById('filter-status').value
  const p = document.getElementById('filter-priority').value
  if (q) params.set('queue_name', q)
  if (s) params.set('status', s)
  if (p) params.set('priority', p)
  params.set('limit', '100')

  try {
    const res = await fetch(`/api/get-admin-queues?${params}`, {
      headers: { 'x-admin-key': ADMIN_KEY }
    })
    if (res.status === 401) { ADMIN_KEY = ''; sessionStorage.removeItem('musigod_admin_key'); document.getElementById('auth-gate').style.display = 'block'; document.getElementById('admin-content').style.display = 'none'; document.getElementById('auth-error').textContent = 'Invalid admin key.'; document.getElementById('auth-error').classList.add('show'); return; }
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Failed to load')

    renderSummary(data.summary || [])
    renderTasks(data.tasks || [], data.total || 0)

  } catch (err) {
    document.getElementById('queue-table').innerHTML = `<div class="empty-state">Error: ${esc(err.message)}</div>`
  }
}

function renderSummary(summary) {
  const totals = { OPEN: 0, IN_PROGRESS: 0, BLOCKED: 0, COMPLETE: 0, URGENT: 0 }
  summary.forEach(r => {
    if (r.status === 'OPEN')        totals.OPEN        += parseInt(r.task_count) || 0
    if (r.status === 'IN_PROGRESS') totals.IN_PROGRESS += parseInt(r.task_count) || 0
    if (r.status === 'BLOCKED')     totals.BLOCKED     += parseInt(r.task_count) || 0
    if (r.status === 'COMPLETE')    totals.COMPLETE    += parseInt(r.task_count) || 0
    if (r.priority === 'URGENT')    totals.URGENT      += parseInt(r.task_count) || 0
  })
  document.getElementById('summary-grid').innerHTML = [
    ['Open Tasks', totals.OPEN, 'val-blue'],
    ['In Progress', totals.IN_PROGRESS, 'val-amber'],
    ['Blocked', totals.BLOCKED, 'val-red'],
    ['Completed', totals.COMPLETE, 'val-green'],
    ['Urgent', totals.URGENT, 'val-red'],
  ].map(([label, val, cls]) => `
    <div class="summary-cell">
      <div class="summary-label">${label}</div>
      <div class="summary-val" style="color:var(--${cls.replace('val-','')})">${val}</div>
    </div>`).join('')
}

function renderTasks(tasks, total) {
  document.getElementById('task-count').textContent = total + ' task' + (total !== 1 ? 's' : '')
  if (!tasks.length) {
    document.getElementById('queue-table').innerHTML = '<div class="empty-state">No tasks match the current filters.</div>'
    return
  }
  const rows = tasks.map(t => `
    <tr id="row-${t.id}">
      <td>
        <div class="task-title">${esc(t.task_title)}</div>
        ${t.task_body ? `<div class="task-body">${esc(t.task_body)}</div>` : ''}
      </td>
      <td style="font-size:0.72rem">${esc(t.artist_email)}</td>
      <td><span style="font-size:0.68rem;color:var(--text-muted)">${esc(t.queue_name.replace(/_/g,' '))}</span></td>
      <td><span class="badge badge-${t.priority.toLowerCase()}">${t.priority}</span></td>
      <td><span class="badge badge-${statusClass(t.status)}">${t.status.replace('_',' ')}</span></td>
      <td style="font-size:0.68rem;color:var(--text-muted)">${t.due_at ? new Date(t.due_at).toLocaleDateString() : '—'}</td>
      <td>
        <div class="actions">
          ${t.status !== 'IN_PROGRESS' && t.status !== 'COMPLETE' && t.status !== 'CANCELLED'
            ? `<button class="btn btn-sm btn-amber" onclick="updateTask('${t.id}','IN_PROGRESS')">Start</button>` : ''}
          ${t.status !== 'COMPLETE' && t.status !== 'CANCELLED'
            ? `<button class="btn btn-sm btn-green" onclick="updateTask('${t.id}','COMPLETE')">Done</button>` : ''}
          ${t.status !== 'BLOCKED' && t.status !== 'COMPLETE' && t.status !== 'CANCELLED'
            ? `<button class="btn btn-sm btn-gray" onclick="updateTask('${t.id}','BLOCKED')">Block</button>` : ''}
          <input class="assign-input" placeholder="Assign to…" id="assign-${t.id}" value="${esc(t.assigned_to||'')}">
          <button class="btn btn-sm btn-blue" onclick="assignTask('${t.id}')">Assign</button>
        </div>
      </td>
    </tr>`).join('')

  document.getElementById('queue-table').innerHTML = `
    <table class="task-table">
      <thead><tr>
        <th>Task</th><th>Artist</th><th>Queue</th><th>Priority</th><th>Status</th><th>Due</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`
}

async function updateTask(taskId, status) {
  try {
    const res = await fetch('/api/update-admin-queue-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ task_id: taskId, status }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Update failed')
    showMsg('success', `Task marked ${status.replace('_',' ').toLowerCase()}.`)
    loadQueues()
  } catch (err) { showMsg('error', err.message) }
}

async function assignTask(taskId) {
  const assigned_to = document.getElementById('assign-' + taskId).value.trim()
  try {
    const res = await fetch('/api/update-admin-queue-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ task_id: taskId, assigned_to }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Update failed')
    showMsg('success', 'Task assigned.')
  } catch (err) { showMsg('error', err.message) }
}

function statusClass(s) {
  return { OPEN:'open', IN_PROGRESS:'progress', BLOCKED:'blocked', COMPLETE:'complete', CANCELLED:'cancelled' }[s] || 'open'
}
function showMsg(type, msg) {
  const id = type === 'success' ? 'msg-success' : 'msg-error'
  const el = document.getElementById(id)
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 4000)
}
function esc(v) { return String(v||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }
</script>
</body>
</html>
